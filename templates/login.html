<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Penilaian Takbiran</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
    --hijau: #1a5c38; --hijau-muda: #2d8653; --emas: #c9a84c; --emas-muda: #e8c97a;
    --bg: #f5f0e8; --bg-card: #fffef9; --border: #e0d8c8; --merah: #c0392b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image: radial-gradient(circle at 20% 50%, rgba(26,92,56,0.08) 0%, transparent 50%),
                      radial-gradient(circle at 80% 20%, rgba(201,168,76,0.08) 0%, transparent 50%);
}
.login-wrap {
    width: 100%;
    max-width: 420px;
    padding: 1rem;
}
.login-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    box-shadow: 0 8px 40px rgba(26,92,56,0.1);
}
.login-header { text-align: center; margin-bottom: 2rem; }
.login-icon {
    width: 72px; height: 72px;
    background: var(--hijau);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1rem;
    font-size: 2rem;
    border: 3px solid var(--emas);
}
.login-header h1 {
    font-family: 'Amiri', serif;
    font-size: 1.6rem;
    color: var(--hijau);
}
.login-header p { color: #888; font-size: 0.85rem; margin-top: 0.25rem; }
.ornament { color: var(--emas); letter-spacing: 0.5rem; font-size: 1rem; margin: 0.5rem 0; }
.form-group { margin-bottom: 1.25rem; }
.form-group label { display: block; font-weight: 600; font-size: 0.875rem; color: var(--hijau); margin-bottom: 0.5rem; }
.form-group input {
    width: 100%; padding: 0.75rem 1rem;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 0.9rem; font-family: 'Plus Jakarta Sans', sans-serif;
    background: white; outline: none; transition: border-color 0.2s;
}
.form-group input:focus { border-color: var(--hijau); }
.btn-login {
    width: 100%; padding: 0.85rem;
    background: var(--hijau); color: white;
    border: none; border-radius: 8px;
    font-size: 1rem; font-weight: 600;
    font-family: 'Plus Jakarta Sans', sans-serif;
    cursor: pointer; transition: background 0.2s;
    margin-top: 0.5rem;
}
.btn-login:hover { background: var(--hijau-muda); }
.alert { padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.875rem; }
.alert-error { background: #f8d7da; color: #721c24; border-left: 4px solid var(--merah); }
.footer-note { text-align: center; margin-top: 1.5rem; font-size: 0.75rem; color: #aaa; }
</style>
</head>
<body>
<div class="login-wrap">
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon">☪</div>
            <div class="ornament">✦ ✦ ✦</div>
            <h1>Penilaian Takbiran</h1>
            <p>Sistem Penilaian Lomba Takbir</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Masukkan username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn-login">Masuk →</button>
        </form>
        <div class="footer-note">Default admin: username <strong>admin</strong> / password <strong>admin123</strong></div>
    </div>
</div>
</body>
</html>
